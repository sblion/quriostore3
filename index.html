<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>요정의 사연</title>

<style>

body{
margin:0;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.screen{
position:relative;
width:100vw;
height:100vh;
background:#F3EFE6;
font-family:Inter,sans-serif;
}


/* 상단 */

.title-pill{
position:absolute;
top:87px;
left:6.5%;
width:136px;
height:33px;
background:#fff;
border-radius:20px;
box-shadow:0 4px 4px rgba(0,0,0,0.25);
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
color:#6B4D20;
font-size:20px;
}

.progress{
position:absolute;
top:93px;
right:6.5%;
font-weight:700;
color:#6B4D20;
font-size:16px;
}


/* 질문 */

.question{
position:absolute;
width:345px;
top:240px;
left:calc(50% - 345px/2);
text-align:center;
line-height:30px;
color:#6B4D20;
}

.question .line1{
font-size:22px;
font-weight:700;
margin-bottom:12px;
}

.question .line2{
font-size:18px;
margin-bottom:25px;
}



/* 선택지 */

.options{
position:absolute;
top:350px;
left:50%;
transform: translateX(-50%);
width:350px;
display:flex;
flex-direction:column;
gap:11px;
}

.option{
width:350px;
height:46px;
background:#FEFCF7;
border:1px solid #6B4D20;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:700;
color:#6B4D20;
cursor:pointer;
transition:0.2s;
}

.option:hover{
background:#f8f3e8;
}


/* 정답 */

.correct{
background:#6B4D20;
color:white;
}


/* 흔들림 */

@keyframes shake{
0%{transform:translateX(0)}
20%{transform:translateX(-6px)}
40%{transform:translateX(6px)}
60%{transform:translateX(-6px)}
80%{transform:translateX(6px)}
100%{transform:translateX(0)}
}

.shake{
animation:shake 0.35s;
}


/* 영상 영역 */

.video-area{
position:absolute;
top:150px;
left:50%;
transform: translateX(-50%);
width:87%;
display:none;

flex-direction: column;
align-items: center;
gap: 80px; /* 영상과 로고 사이의 간격 */
}

.video-area video{
width:100%;
border-radius:12px;
}

.bottom-logo{
width:220px;


}

</style>
</head>

<body>

<div class="screen">

<div class="title-pill">요정의 사연</div>
<div class="progress">진행률 80%</div>


<div class="question">
<div class="line1">요정의 사연을 들었다 나의 선택은?</div>
<div class="line2">정답은 무엇인가요?</div>
</div>


<div class="options">

<div class="option" data-answer="correct">
별사탕 가루가 묻어있네
</div>

<div class="option">
아이스 해양과학 티백
</div>

<div class="option">
요정은 젤리를 좋아해
</div>

</div>


<div id="videoArea" class="video-area">
  <video id="storyVideo" width="350" controls>
    <source src="video2.mp4" type="video/mp4">
  </video>
  <img id="bottomLogo" class="bottom-logo" src="logo.png">
</div>



<script>

const options = document.querySelectorAll(".option");
const question = document.querySelector(".question");
const optionsBox = document.querySelector(".options");
const videoArea = document.getElementById("videoArea");
const video = document.getElementById("storyVideo");
const logo = document.getElementById("bottomLogo");

options.forEach(option => {

option.addEventListener("click",()=>{

const correct = option.dataset.answer === "correct";

if(correct){

/* 문제 영역 숨기기 */

question.style.display = "none";
optionsBox.style.display = "none";

/* 영상 표시 */

videoArea.style.display = "flex";
logo.style.display = "block";
video.play();

}else{

option.classList.add("shake");

setTimeout(()=>{
option.classList.remove("shake");
},350);

}

});

});

</script>

</body>
</html>
