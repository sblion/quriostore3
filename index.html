<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>요정의 사연</title>

<style>
body {
    margin: 0;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.screen {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #F3EFE6;
    font-family: Inter, sans-serif;
    overflow: hidden;
}

/* 상단 */
.title-pill {
    position: absolute; top: 87px; left: 6.5%; width: 136px; height: 33px;
    background: #fff; border-radius: 20px; box-shadow: 0 4px 4px rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #6B4D20; font-size: 20px; z-index: 10;
}

.progress {
    position: absolute; top: 93px; right: 6.5%;
    font-weight: 700; color: #6B4D20; font-size: 16px; z-index: 10;
}

/* 질문 및 선택지 */
.question {
    position: absolute; width: 345px; top: 240px; left: 50%; transform: translateX(-50%);
    text-align: center; line-height: 30px; color: #6B4D20;
}
.question .line1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
.question .line2 { font-size: 18px; margin-bottom: 25px; }

.options {
    position: absolute; top: 350px; left: 50%; transform: translateX(-50%);
    width: 350px; display: flex; flex-direction: column; gap: 11px;
}
.option {
    width: 350px; height: 46px; background: #FEFCF7; border: 1px solid #6B4D20;
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: #6B4D20; cursor: pointer; transition: 0.2s;
}
.option:hover { background: #f8f3e8; }

/* 흔들림 효과 */
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
}
.shake { animation: shake 0.35s; }

/* 슬라이더 영역 (수정된 부분) */
.slider-area {
    position: absolute; top: 150px; left: 50%; transform: translateX(-50%);
    width: 87%; display: none; /* 처음엔 숨김 */
    flex-direction: column; align-items: center;
}

.slider-container {
    width: 100%; aspect-ratio: 1/1; background: #000;
    border-radius: 12px; overflow: hidden; position: relative;
}

.slider-wrapper {
    display: flex; width: 100%; height: 100%; transition: transform 0.4s ease-out;
}

.slider-wrapper img {
    width: 100%; height: 100%; flex-shrink: 0; object-fit: cover;
}

/* 슬라이더 버튼 및 페이지 번호 */
.nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 40px; height: 40px; background: rgba(0,0,0,0.3); color: white;
    border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.prev-btn { left: 10px; }
.next-btn { right: 10px; }

.page-idx {
    margin-top: 15px; font-weight: 700; color: #6B4D20; font-size: 18px;
}

.bottom-logo { width: 220px; margin-top: 40px; }
</style>
</head>

<body>

<div class="screen">
    <div class="title-pill">요정의 사연</div>
    <div class="progress">진행률 80%</div>

    <div class="question" id="questionBox">
        <div class="line1">요정의 사연을 들었다 나의 선택은?</div>
        <div class="line2">정답은 무엇인가요?</div>
    </div>

    <div class="options" id="optionsBox">
        <div class="option" data-answer="correct">별사탕 가루가 묻어있네</div>
        <div class="option">아이스 해양과학 티백</div>
        <div class="option">요정은 젤리를 좋아해</div>
    </div>

    <div id="sliderArea" class="slider-area">
        <div class="slider-container">
            <div class="slider-wrapper" id="sliderWrapper">
                <img src="photo1.png" alt="이미지 1">
                <img src="photo2.png" alt="이미지 2">
                <img src="photo3.png" alt="이미지 3">
                <img src="photo4.png" alt="이미지 4">
                <img src="photo5.png" alt="이미지 5">
                <img src="photo6.png" alt="이미지 6">
            </div>
            <div class="nav-btn prev-btn" id="prevBtn">❮</div>
            <div class="nav-btn next-btn" id="nextBtn">❯</div>
        </div>
        <div class="page-idx" id="pageIdx">1 / 6</div>
        <img class="bottom-logo" src="logo.png">
    </div>
</div>

<script>
    const options = document.querySelectorAll(".option");
    const questionBox = document.getElementById("questionBox");
    const optionsBox = document.getElementById("optionsBox");
    const sliderArea = document.getElementById("sliderArea");
    
    const wrapper = document.getElementById("sliderWrapper");
    const images = document.querySelectorAll(".slider-wrapper img");
    const pageIdxText = document.getElementById("pageIdx");

    let currentIndex = 0;
    const totalImages = images.length;

    // 슬라이더 업데이트 함수
    function updateSlider() {
        wrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
        pageIdxText.innerText = `${currentIndex + 1} / ${totalImages}`;
    }

    // 선택지 클릭 이벤트
    options.forEach(option => {
        option.addEventListener("click", () => {
            const isCorrect = option.dataset.answer === "correct";

            if (isCorrect) {
                // 문제 숨기고 슬라이더 보이기
                questionBox.style.display = "none";
                optionsBox.style.display = "none";
                sliderArea.style.display = "flex";
            } else {
                // 오답 시 흔들림
                option.classList.add("shake");
                setTimeout(() => option.classList.remove("shake"), 350);
            }
        });
    });

    // 슬라이더 버튼 이벤트
    document.getElementById("nextBtn").addEventListener("click", () => {
        if (currentIndex < totalImages - 1) {
            currentIndex++;
            updateSlider();
        }
    });

    document.getElementById("prevBtn").addEventListener("click", () => {
        if (currentIndex > 0) {
            currentIndex--;
            updateSlider();
        }
    });
</script>

</body>
</html>
